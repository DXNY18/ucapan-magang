<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
    <style>
        @keyframes modalPop {0% {transform:scale(0.7);opacity:0} 50% {transform:scale(1.05);opacity:0.9} 100% {transform:scale(1);opacity:1}}
        #modal-backdrop {animation: fadeIn 0.3s ease;}
        @keyframes fadeIn {from {opacity:0} to {opacity:1}}
    </style>
</head>
<body>
<div id="intro" class="main-container">
  <h1 id="hero-title"><span id="typing-text"></span><span id="cursor">|</span></h1>
  <button onclick="bukaNama()">Klik untuk membuka 💖</button>
</div>

<div id="inputNama" class="container" style="display:none;">
  <h2 style="font-size: clamp(1.3rem, 6vw, 1.8rem);">💗 Siapa namamu?</h2>
  <input type="text" id="nama" placeholder="Tulis Namamu">
  <button onclick="tampilkanUcapan()">Lanjut ✨</button>
</div>

<div id="ucapan" style="display:none;">
  <h1 id="ucapan-title"><span id="ucapan-text"></span><span id="ucapan-cursor">|</span></h1>
</div>

<div id="side_ucapan" style="display:none;">
    <h2 id="side-title"><span id="side-text"></span><span id="side-cursor">|</span></h2>
</div>

<script>
function bukaNama() {
  document.getElementById("intro").style.display = "none";
  document.getElementById("inputNama").style.display = "block";
}

function tampilkanUcapan() {
  let nama = document.getElementById("nama").value;
  if (nama === "") {
    alert("Isi namanya dulu ya 💖");
    return;
  }
  document.getElementById("inputNama").style.display = "none";
  document.getElementById("ucapan").style.display = "block";
  document.getElementById("side_ucapan").style.display = "block";
  const ucapanFullText = "Selamat Telah Menyelesaikan Masa Magangnya ya " + nama + " ";
  typeUcapanWriter(ucapanFullText);
}

function showPesan() {
  const backdrop = document.createElement('div');
  backdrop.id = 'modal-backdrop';
  backdrop.style.cssText = 'position:fixed;top:0;left:0;width:100vw;height:100vh;background:rgba(255,182,193,0.9);backdrop-filter:blur(10px);z-index:1000;display:flex;align-items:center;justify-content:center;opacity:1;';
  
  const modal = document.createElement('div');
  modal.style.cssText = 'background:linear-gradient(135deg,#fff,#ffeef2);padding:35px;border-radius:25px;max-width:90vw;max-width:420px;width:100%;box-shadow:0 30px 100px rgba(255,20,147,0.4);border:3px solid rgba(255,105,180,0.6);max-height:85vh;overflow-y:auto;transform:scale(0.7);animation:modalPop 0.5s forwards;';
  
  const nama = document.getElementById("nama").value;
  modal.innerHTML = `
    <h3 style="color:#ff1493;text-align:center;font-size:clamp(1.3rem,6vw,1.7rem);margin:0 0 20px 0;font-weight:bold">💖 Pesan Rahasia 💖</h3>
    <p style="font-size:clamp(1rem,4.5vw,1.25rem);line-height:1.7;margin:0 0 30px 0;color:#444;text-align:justify">
      Terima kasih ya kamu telah melewati masa-masa yang lumayan berat saat magang maupun aku gak tau beratnya seperti apa karena aku belum merasakannya, tapi kamu salah satu orang terhebat yang pernah aku ketahui karena ga semua orang bisa seperti kamu. Dan sepertinya aku tidak salah menyukai seseorang yaitu kamu <strong style="color:#ff1493">${nama}</strong>. Maaf ya semisalnya aku selalu bikin risih 
    </p>
    <div style="text-align:center">
      <button onclick="tutupPesan()" style="padding:16px 40px;font-size:1.15rem;font-weight:bold;background:linear-gradient(45deg,#ff69b4,#ff1493);border:none;border-radius:35px;color:white;cursor:pointer;box-shadow:0 10px 30px rgba(255,105,180,0.5);transition:all 0.3s ease">✨ Tutup </button>
    </div>
  `;
  
  backdrop.appendChild(modal);
  document.body.appendChild(backdrop);
  backdrop.onclick = e => { if (e.target === backdrop) tutupPesan(); };
}

function tutupPesan() {
  const backdrop = document.getElementById('modal-backdrop');
  if (backdrop) {
    backdrop.style.opacity = '0';
    backdrop.style.transform = 'scale(0.95)';
    setTimeout(() => backdrop.remove(), 300);
  }
}

function typeUcapanWriter(text) {
  const typingElement = document.getElementById("ucapan-text");
  const cursorElement = document.getElementById("ucapan-cursor");
  let i = 0;
  typingElement.textContent = "";
  cursorElement.style.display = "inline";
  function typeChar() {
    if (i < text.length) {
      typingElement.textContent += text.charAt(i);
      i++;
      setTimeout(typeChar, 120);
    } else {
      cursorElement.style.display = "none";
      setTimeout(() => {
        const sideText = "From Pemuja Rahasia to " + document.getElementById("nama").value + " ";
        typeSideTitleWriter(sideText);
      }, 500);
      const sideDuration = sideText.length * 100 + 500;
      setTimeout(() => askPesan(), sideDuration);
    }
  }
  typeChar();
}

function askPesan() {
  const container = document.createElement('div');
  container.id = 'ucapan-buttons-container';
  container.style.position = 'relative';
  container.style.width = '100%';
  container.style.height = '300px';
  container.style.overflow = 'hidden';
  container.style.marginTop = '40px';
  
  const buttonsDiv = document.createElement('div');
  buttonsDiv.style.position = 'absolute';
  buttonsDiv.style.display = 'flex';
  buttonsDiv.style.gap = '15px';
  buttonsDiv.style.top = '50%';
  buttonsDiv.style.left = '50%';
  buttonsDiv.style.transform = 'translate(-50%, -50%)';
  
  const iyaButton = document.createElement('button');
  iyaButton.innerHTML = '✅ Iya ';
  iyaButton.style.background = 'linear-gradient(45deg, #ff69b4, #ff1493)';
  iyaButton.onclick = showPesan;
  
  const tidakButton = document.createElement('button');
  tidakButton.innerHTML = '❌ Tidak';
  tidakButton.id = 'tombolTidak';
  tidakButton.style.background = 'linear-gradient(45deg, #ff4757, #ff3838)';
  tidakButton.onclick = function() { pindahTidakButton(this); };
  
  buttonsDiv.appendChild(iyaButton);
  buttonsDiv.appendChild(tidakButton);
  container.appendChild(buttonsDiv);
  document.getElementById("ucapan").appendChild(container);
}

function typeSideTitleWriter(text) {
  const typingElement = document.getElementById("side-text");
  const cursorElement = document.getElementById("side-cursor");
  let i = 0;
  typingElement.textContent = "";
  cursorElement.style.display = "inline";
  function typeChar() {
    if (i < text.length) {
      typingElement.textContent += text.charAt(i);
      i++;
      setTimeout(typeChar, 100);
    } else {
      cursorElement.style.display = "none";
      setTimeout(askPesan, 300);
    }
  }
  typeChar();
}

function typeWriter() {
  const text = "hai kamu yang membuka website ini";
  const typingElement = document.getElementById("typing-text");
  const cursorElement = document.getElementById("cursor");
  let i = 0;
  function typeChar() {
    if (i < text.length) {
      typingElement.textContent += text.charAt(i);
      i++;
      setTimeout(typeChar, 100);
    } else {
      cursorElement.style.display = "none";
    }
  }
  typeChar();
}

function pindahTidakButton(btn) {
  const container = document.getElementById('ucapan-buttons-container');
  const rect = container.getBoundingClientRect();
  const containerWidth = rect.width;
  const containerHeight = rect.height;
  const padding = 100;
  btn.style.position = 'absolute';
  btn.style.zIndex = '10';
  btn.style.transition = 'all 0.6s cubic-bezier(0.68, -0.55, 0.265, 1.55)';
  btn.style.transform = 'scale(0.3) rotate(180deg)';
  setTimeout(() => {
    const randomX = padding + Math.random() * (containerWidth - btn.offsetWidth - padding);
    const randomY = padding + Math.random() * (containerHeight - btn.offsetHeight - padding);
    btn.style.left = randomX + 'px';
    btn.style.top = randomY + 'px';
    btn.style.transform = 'scale(1) rotate(360deg)';
  }, 200);
}

document.addEventListener("DOMContentLoaded", typeWriter);
</script>
</body>
</html>
